<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .btn-container {
            margin-top: 30px;
        }

        button {
            cursor: pointer;
            padding: 10px 15px;
            margin-right: 10px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <h1>Result for {{ player_name }}</h1>
    <p>Shooting Score: {{ result["Composite Z-Score"] }}</p>
    <p>Season: {{ result["Season"] }}</p>
    <p>Position: {{ result["Position"] }}</p>
    <p>Percentile: {{ result["Percentile"] }}</p>
    <p>Rank: {{ result["Rank"] }} out of {{ result["Total Players"] }}</p>

    <!-- Button container -->
    <div class="btn-container">
        <!-- Change '/shooting-score' to the URL path that serves your index.html -->
        <button onclick="window.location.href='/shooting-score';">
            Search Another Player
        </button>

        <!-- Change '/' to the home route if you named it differently -->
        <button onclick="window.location.href='/';">
            Return Home
        </button>
    </div>
</body>
</html>
