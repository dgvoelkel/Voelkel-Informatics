<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voelkel Informatics Home</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        .note {
            font-style: italic;
            margin: 30px 0;
        }
        .menu {
            margin-top: 40px;
        }
        .menu button {
            padding: 10px 20px;
            margin: 20px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* BOUNCING BALL */
        .bouncing-ball-container {
            position: fixed;
            bottom: 20px; /* How far from bottom you want the ball */
            left: 0;      /* Start near the left edge */
            z-index: 9999;
            animation: bounceAcross 6s linear infinite; 
            /* ^ total duration: 6s (tweak as needed),
               infinite repetition so it keeps bouncing */
        }
        .bouncing-ball-container img {
            width: 60px;  /* Adjust as desired */
            height: 60px; /* Adjust as desired */
            object-fit: contain;
        }

        /* Keyframes for 5 bounces before leaving screen */
        @keyframes bounceAcross {
            0% {
                /* slightly off left edge, on ground */
                transform: translateX(-80px) translateY(0);
            }
            10% {
                /* 1st apex */
                transform: translateX(10vw) translateY(-100px);
            }
            20% {
                /* back to ground */
                transform: translateX(20vw) translateY(0);
            }

            30% {
                /* 2nd apex */
                transform: translateX(30vw) translateY(-100px);
            }
            40% {
                /* back to ground */
                transform: translateX(40vw) translateY(0);
            }

            50% {
                /* 3rd apex */
                transform: translateX(50vw) translateY(-100px);
            }
            60% {
                /* back to ground */
                transform: translateX(60vw) translateY(0);
            }

            70% {
                /* 4th apex */
                transform: translateX(70vw) translateY(-100px);
            }
            80% {
                /* back to ground */
                transform: translateX(80vw) translateY(0);
            }

            90% {
                /* 5th apex */
                transform: translateX(90vw) translateY(-100px);
            }
            100% {
                /* off right edge, instantly resets to left at next iteration */
                transform: translateX(110vw) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Voelkel Informatics!</h1>
        <p class="note">
            Created by Davis Voelkel. Note: Models only work from 1996-1997 onwards.
        </p>

        <div class="menu">
            <h2>Free Models</h2>
            <!-- Button that navigates to the Shooting Score page (index.html) -->
            <button onclick="window.location.href='/shooting-score';">
                Shooting Score
            </button>
        </div>
    </div>

    <!-- Bouncing Basketball -->
    <div class="bouncing-ball-container">
        <!-- You can replace this with a local image if you prefer -->
        <img src="https://img.icons8.com/color/96/basketball.png" alt="Bouncing Basketball">
    </div>
</body>
</html>
