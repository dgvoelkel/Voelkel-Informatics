<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voelkel Informatics Home</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
        }
        .note {
            font-style: italic;
            margin: 30px 0;
        }
        .menu {
            margin-top: 40px;
        }
        .menu button {
            padding: 10px 20px;
            margin: 20px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* BOUNCING BALL */
        .ball-x {
            position: fixed;
            bottom: 20px;
            left: -80px;
            z-index: 0;
            pointer-events: none;
            animation: moveBallX 6s linear infinite;
        }
        .ball-y {
            animation: moveBallY 6s linear infinite;
        }
        .ball-x img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
            animation: spinBall 1s linear infinite;
        }

        @keyframes spinBall {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes moveBallX {
            from { left: -80px; }
            to   { left: 110vw; }
        }

        @keyframes moveBallY {
            0%   { transform: translateY(0);      animation-timing-function: ease-out; }
            10%  { transform: translateY(-150px); animation-timing-function: ease-in;  }
            20%  { transform: translateY(0);      animation-timing-function: ease-out; }
            30%  { transform: translateY(-150px); animation-timing-function: ease-in;  }
            40%  { transform: translateY(0);      animation-timing-function: ease-out; }
            50%  { transform: translateY(-150px); animation-timing-function: ease-in;  }
            60%  { transform: translateY(0);      animation-timing-function: ease-out; }
            70%  { transform: translateY(-150px); animation-timing-function: ease-in;  }
            80%  { transform: translateY(0);      animation-timing-function: ease-out; }
            90%  { transform: translateY(-150px); animation-timing-function: ease-in;  }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Voelkel Informatics!</h1>
        <p class="note">
            Created by Davis Voelkel. Note: Models only work from 1996-1997 onwards.
        </p>

        <div class="menu">
            <h2>Free Models</h2>
            <!-- Button that navigates to the Shooting Score page (index.html) -->
            <button onclick="window.location.href='/shooting-score';">
                Shooting Score
            </button>
        </div>
    </div>

    <!-- Bouncing Basketball -->
    <div class="ball-x">
        <div class="ball-y">
            <img src="https://img.icons8.com/color/96/basketball.png" alt="Bouncing Basketball">
        </div>
    </div>
</body>
</html>
