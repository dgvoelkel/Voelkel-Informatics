<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <style>
        /* Optional basic styling for the button */
        .return-button {
            margin-top: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Error</h1>
    <p>{{ message }}</p>

    <!-- Button that redirects to the index route -->
    <button class="return-button" onclick="window.location.href='/'">
        Return to Home
    </button>
</body>
</html>
