<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LOADING... — Voelkel Informatics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* CRT scanline overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 2px,
                rgba(0,0,0,0.25) 2px, rgba(0,0,0,0.25) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── PIXEL COURT ───────────────────────────────────── */
        .court {
            width: 320px;
            height: 200px;
            border: 4px solid #ff6600;
            background: #0d0800;
            position: relative;
            margin-bottom: 40px;
            box-shadow: 0 0 24px #ff6600, inset 0 0 30px rgba(255,102,0,0.08);
        }

        /* half-court line */
        .court::before {
            content: '';
            position: absolute;
            left: 50%; top: 0;
            width: 4px; height: 100%;
            background: #ff6600;
            opacity: 0.3;
            transform: translateX(-50%);
        }

        /* center circle */
        .court::after {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            width: 64px; height: 64px;
            border: 3px solid #ff6600;
            border-radius: 50%;
            opacity: 0.3;
            transform: translate(-50%, -50%);
        }

        /* ── PIXEL PLAYER ──────────────────────────────────── */
        .player {
            position: absolute;
            bottom: 16px;
            left: 40px;
            width: 24px;
            height: 40px;
            animation: run 8s linear infinite, dunk 2s steps(4) infinite;
        }

        /* Head */
        .player .head {
            width: 16px; height: 16px;
            background: #ffe000;
            position: absolute;
            top: 0; left: 4px;
            image-rendering: pixelated;
        }

        /* Body */
        .player .body {
            width: 20px; height: 14px;
            background: #ff6600;
            position: absolute;
            top: 14px; left: 2px;
        }

        /* Legs */
        .player .leg-l {
            width: 8px; height: 12px;
            background: #cc4400;
            position: absolute;
            top: 28px; left: 2px;
            animation: leg-l 0.4s steps(2) infinite;
        }

        .player .leg-r {
            width: 8px; height: 12px;
            background: #cc4400;
            position: absolute;
            top: 28px; left: 12px;
            animation: leg-r 0.4s steps(2) infinite;
        }

        @keyframes leg-l {
            0%   { height: 12px; top: 28px; }
            50%  { height: 8px;  top: 32px; }
        }
        @keyframes leg-r {
            0%   { height: 8px;  top: 32px; }
            50%  { height: 12px; top: 28px; }
        }

        @keyframes run {
            0%   { left: 20px; }
            45%  { left: 260px; }
            50%  { left: 260px; }
            95%  { left: 20px; }
            100% { left: 20px; }
        }

        /* Ball rolling across court */
        .ball {
            position: absolute;
            bottom: 12px;
            left: 80px;
            font-size: 20px;
            animation: ballroll 8s linear infinite;
        }

        @keyframes ballroll {
            0%   { left: 60px;  }
            45%  { left: 220px; }
            50%  { left: 220px; }
            95%  { left: 60px;  }
            100% { left: 60px;  }
        }

        /* ── SCOREBOARD BAR ────────────────────────────────── */
        .scoreboard {
            width: 320px;
            margin-bottom: 24px;
        }

        .scoreboard-header {
            display: flex;
            justify-content: space-between;
            font-size: 7px;
            color: #555;
            margin-bottom: 8px;
        }

        .bar-outer {
            width: 320px;
            height: 24px;
            background: #1a1a1a;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }

        /* CSS-driven fill: animates 0→88% over 30s, stops there until JS completes it */
        .bar-fill {
            height: 100%;
            width: 0%;
            background: #ff6600;
            box-shadow: 0 0 8px #ff6600;
            animation: barGrow 30s ease-out forwards;
        }

        @keyframes barGrow {
            0%   { width: 0%; }
            100% { width: 88%; }
        }

        /* JS adds this class when /ready returns true */
        .bar-fill.complete {
            animation: none;
            width: 100%;
            transition: width 0.4s ease;
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }

        /* Pixel block overlay so the bar looks segmented */
        .bar-outer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                to right,
                transparent 0px,
                transparent 28px,
                #0a0a0a 28px,
                #0a0a0a 32px
            );
            pointer-events: none;
        }

        /* ── FLAVOR TEXT ────────────────────────────────────── */
        .flavor {
            font-size: 8px;
            color: #00ff88;
            letter-spacing: 1px;
            margin-bottom: 32px;
            min-height: 20px;
            text-align: center;
        }

        .title-text {
            font-size: 12px;
            color: #ff6600;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 #7a2e00;
        }

        .sub-text {
            font-size: 7px;
            color: #555;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="title-text">LOADING...</div>
    <div class="sub-text">TRAINING REGRESSION MODEL</div>

    <!-- Pixel basketball court -->
    <div class="court">
        <div class="player">
            <div class="head"></div>
            <div class="body"></div>
            <div class="leg-l"></div>
            <div class="leg-r"></div>
        </div>
        <div class="ball">🏀</div>
    </div>

    <!-- Scoreboard loading bar -->
    <div class="scoreboard">
        <div class="scoreboard-header">
            <span>PROGRESS</span>
            <span id="pct-label">LOADING...</span>
        </div>
        <div class="bar-outer">
            <div class="bar-fill" id="bar-fill"></div>
        </div>
    </div>

    <!-- Flavor text -->
    <div class="flavor" id="flavor">INITIALIZING...</div>

    <script>
        const FLAVORS = [
            "READING GAME LOGS...",
            "CRUNCHING STATS...",
            "COMPUTING FEATURES...",
            "TRAINING MODEL...",
            "CROSS-VALIDATING...",
            "LACING UP...",
            "ALMOST READY...",
            "WARMING UP THE BENCH..."
        ];

        let flavorIdx = 0;
        const flavorEl  = document.getElementById("flavor");
        const pctLabel  = document.getElementById("pct-label");
        const barFill   = document.getElementById("bar-fill");

        // Cycle flavor text every 3.5s — independent of everything else
        setInterval(function() {
            flavorIdx = (flavorIdx + 1) % FLAVORS.length;
            flavorEl.textContent = FLAVORS[flavorIdx];
        }, 3500);

        // Update pct label to mirror the CSS animation progress
        // Matches the 30s barGrow keyframe (0→88% over 30s)
        var startTime = Date.now();
        setInterval(function() {
            var elapsed = (Date.now() - startTime) / 1000;
            var pct = Math.min(Math.round((elapsed / 30) * 88), 88);
            pctLabel.textContent = pct + "%";
        }, 500);

        // Retrieve pending form data from sessionStorage
        var pendingForm = null;
        try { pendingForm = JSON.parse(sessionStorage.getItem("nba_pending_form") || "null"); } catch(e) {}

        function submitPendingForm() {
            if (pendingForm) {
                var form = document.createElement("form");
                form.method = "POST";
                form.action = "/nba-predictor/result";
                for (var k in pendingForm) {
                    var input = document.createElement("input");
                    input.type  = "hidden";
                    input.name  = k;
                    input.value = pendingForm[k];
                    form.appendChild(input);
                }
                document.body.appendChild(form);
                sessionStorage.removeItem("nba_pending_form");
                form.submit();
            } else {
                window.location.href = "/nba-predictor";
            }
        }

        // Poll /ready every 2s
        function checkReady() {
            fetch("/ready")
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.ready) {
                        // Complete the bar immediately via CSS class
                        barFill.classList.add("complete");
                        pctLabel.textContent = "100%";
                        flavorEl.textContent = "GO!";
                        setTimeout(submitPendingForm, 800);
                    } else if (data.error) {
                        pctLabel.textContent = "ERR";
                        flavorEl.textContent = "ERROR - CHECK SERVER LOGS";
                    } else {
                        setTimeout(checkReady, 2000);
                    }
                })
                .catch(function() { setTimeout(checkReady, 2000); });
        }

        // Start polling immediately; the CSS animation handles the visual regardless
        setTimeout(checkReady, 1000);
    </script>

</body>
</html>
